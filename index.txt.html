  .start-btn:active{transform:translateY(0) scale(.98)}

  @media(max-width:480px){

// ─── 이미지 훅 ────────────────────────────────
function useJobImage(keyword) {
  const [src, setSrc] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setSrc(null);
    const encoded = encodeURIComponent(keyword);
    fetch(`https://api.pexels.com/v1/search?query=${encoded}&per_page=3&orientation=square`, {
      headers: { Authorization: PEXELS_KEY }
    })
      .then(r => r.json())
      .then(data => {
        if (!cancelled && data.photos && data.photos.length > 0) {
          const idx = Math.floor(Math.random() * Math.min(data.photos.length, 3));
          setSrc(data.photos[idx].src.medium);
        }
      })
      .catch(() => {})
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [keyword]);

  return { src, loading };
}

// ─── 직업 카드 컴포넌트 ──────────────────────
function JobCard({ job, onClick, chosen, unchosen }) {
  const { src, loading } = useJobImage(job.keyword);
  const cls = ["job-card", chosen ? "chosen" : "", unchosen ? "unchosen" : ""].join(" ");

  return (
    <div className={cls} onClick={() => !chosen && !unchosen && onClick(job)}>
      <div className="card-img-wrap">
        {loading && <div className="card-skeleton" />}
        {!loading && src && <img className="card-img" src={src} alt={job.name} loading="lazy" />}
        {!loading && !src && <div className="card-emoji">{job.emoji}</div>}
      </div>
      <div className="card-body">
        <div className="job-name jua">{job.name}</div>
        <div className="job-emoji-small">{job.emoji}</div>
        <div className="pick-hint">👆 탭해서 선택!</div>
      </div>
    </div>
  );
}

      <div className="bg-blob" style={{width:350,height:350,background:"radial-gradient(#c471ed,transparent)",bottom:-80,right:-80}}/>
      <div className="bg-blob" style={{width:300,height:300,background:"radial-gradient(#12c2e9,transparent)",top:"40%",left:"40%"}}/>
    </div>
  );
}

// ─── 결과 화면 ───────────────────────────────
function ResultScreen({ winner, nickname, onRetry }) {
  const { src, loading } = useJobImage(winner.keyword);
  const canvasRef = useRef(null);

  // 컨페티
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ["#ff6b6b","#c471ed","#12c2e9","#ffd93d","#6bcb77","#ff8e53"];
    const pieces = Array.from({length:120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      r: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random()*colors.length)],
      speed: Math.random() * 3 + 2,
      spin: (Math.random() - .5) * .2,
      angle: 0,
    }));
    let raf;
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);
        ctx.restore();
        p.y += p.speed;
        p.angle += p.spin;
        if (p.y > canvas.height) { p.y = -20; p.x = Math.random()*canvas.width; }
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    const t = setTimeout(() => cancelAnimationFrame(raf), 6000);
    return () => { cancelAnimationFrame(raf); clearTimeout(t); };
  }, []);

  const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(winner.search)}`;
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(winner.youtube)}`;
  const kidsUrl = `https://www.career.go.kr/cnet/front/main/main.do`;

  return (
    <div className="screen-result">
      <canvas ref={canvasRef} style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}/>
      <div className="result-card">
        <span className="winner-crown jua">🏆</span>
        <p className="result-title jua"><span className="nick-highlight">{nickname}</span>의 원픽 직업!</p>

        <div className="winner-img-wrap">
          {loading && <div className="card-skeleton" style={{position:"absolute",inset:0}}/>}
          {!loading && src && <img className="winner-img" src={src} alt={winner.name}/>}
          {!loading && !src && <div className="winner-emoji-big">{winner.emoji}</div>}
        </div>

        <h2 className="winner-name jua">{winner.emoji} {winner.name}</h2>
        <p className="winner-desc">{winner.desc}</p>

        <div className="info-section">
          <div className="info-label">💪 필요한 능력</div>
          <div className="tag-row">{winner.skills.map(s=><span key={s} className="tag tag-skill">{s}</span>)}</div>
        </div>
        <div className="info-section">
          <div className="info-label">📖 관련 교과</div>
          <div className="tag-row">{winner.subjects.map(s=><span key={s} className="tag tag-subject">{s}</span>)}</div>
        </div>
        <div className="info-section">
          <div className="info-label">🙋 이런 사람에게 잘 맞아요</div>
          <div className="tag-row">{winner.traits.map(t=><span key={t} className="tag tag-trait">{t}</span>)}</div>
        </div>

        <div className="link-section">
          <a className="link-btn" href={searchUrl} target="_blank" rel="noreferrer">
            <span className="link-icon">🔍</span> 구글에서 더 알아보기
          </a>
          <a className="link-btn" href={ytUrl} target="_blank" rel="noreferrer">
            <span className="link-icon">▶️</span> 유튜브에서 영상 보기
          </a>
          <a className="link-btn" href={kidsUrl} target="_blank" rel="noreferrer">
            <span className="link-icon">🌟</span> 커리어넷에서 탐색하기
          </a>
        </div>

        <button className="retry-btn jua" onClick={onRetry}>🔄 다시 하기</button>
      </div>
    </div>
  );
}

// ─── 게임 화면 ───────────────────────────────
function GameScreen({ nickname, jobs, onFinish }) {
  const totalRounds = jobs.length;
  const [bracket, setBracket] = useState(() => shuffle([...jobs]));
  const [current, setCurrent] = useState(0);
  const [winners, setWinners] = useState([]);
  const [comment, setComment] = useState(COMMENTS[0]);
  const [chosen, setChosen] = useState(null);
  const [unchosen, setUnchosen] = useState(null);

  const completed = Math.floor(current / 2);
  const totalPairs = Math.floor(bracket.length / 2);
  const roundSize = bracket.length;
  const roundName = roundSize === 2 ? "결승" : roundSize === 4 ? "4강" : roundSize === 8 ? "8강" : "16강";

  const overallDone = completed + winners.length;
  const overallTotal = totalRounds - 1;
  const progress = Math.min((overallDone / overallTotal) * 100, 100);

  const handlePick = useCallback((picked) => {
    const pairIdx = current;
    const other = bracket[pairIdx] === picked ? bracket[pairIdx+1] : bracket[pairIdx];
    setChosen(picked.id);
    setUnchosen(other.id);
    setComment(COMMENTS[Math.floor(Math.random() * COMMENTS.length)]);

    setTimeout(() => {
      setChosen(null);
      setUnchosen(null);
      const nextWinners = [...winners, picked];
      const nextCurrent = current + 2;

      if (nextCurrent >= bracket.length) {
        if (nextWinners.length === 1) {
          onFinish(nextWinners[0]);
          return;
        }
        setBracket(shuffle(nextWinners));
        setWinners([]);
        setCurrent(0);
      } else {
        setWinners(nextWinners);
        setCurrent(nextCurrent);
      }
    }, 500);
  }, [current, bracket, winners, onFinish]);

  const left = bracket[current];
  const right = bracket[current+1];

  return (
    <div className="screen-game">
      <BgDeco/>
      <div className="progress-wrap" style={{position:"relative",zIndex:1}}>
        <div className="progress-info">
          <span className="round-badge jua">🏆 {roundName}</span>
          <span style={{fontSize:".82rem",color:"#888"}}>{completed+1} / {totalPairs} 경기</span>
        </div>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{width:`${progress}%`}}/>
        </div>
      </div>

      <div className="vs-area" style={{position:"relative",zIndex:1}}>
        <p className="jua" style={{fontSize:".95rem",color:"#aaa"}}>👆 더 끌리는 직업을 골라봐!</p>
        <div className="cards-row">
          {left && right && <>
            <JobCard key={left.id+"-"+current} job={left} onClick={handlePick}
              chosen={chosen===left.id} unchosen={unchosen===left.id}/>
            <div className="vs-badge jua">VS</div>
            <JobCard key={right.id+"-"+current} job={right} onClick={handlePick}
              chosen={chosen===right.id} unchosen={unchosen===right.id}/>
          </>}
        </div>
        <div className="comment-box" key={comment}>{comment}</div>
        <p style={{fontSize:".78rem",color:"#ccc",marginTop:".5rem"}}>{nickname} 진행중 ✨</p>
      </div>
    </div>
  );
}

// ─── 닉네임 화면 ──────────────────────────────
function NicknameScreen({ onStart }) {
  const [nick, setNick] = useState("");
  const [roundCount, setRoundCount] = useState(16);

  return (
    <div className="screen-nick">
      <BgDeco/>
      <div className="nick-card">
        <div className="title-badge jua">✨ 진로 탐색 게임</div>
        <h1 className="main-title jua">직업<br/>월드컵</h1>
        <p className="sub-title">내가 좋아하는 직업을 찾아봐! 🔍</p>

        <input
          className="nick-input jua"
          placeholder="닉네임을 입력해줘! 😊"
          value={nick}
          onChange={e => setNick(e.target.value)}
          onKeyDown={e => e.key === "Enter" && nick.trim() && onStart(nick.trim(), roundCount)}
          maxLength={10}
          autoFocus
        />

        <div style={{margin:"1rem 0 .5rem",fontSize:".85rem",color:"#aaa"}}>몇 강부터 시작할까?</div>
        <div className="round-select">
          {ROUND_OPTS.map(o => (
            <button key={o.count} className={`round-btn jua ${roundCount===o.count?"active":""}`}
              onClick={() => setRoundCount(o.count)}>
              {o.label}
            </button>
          ))}
        </div>

        <button className="start-btn jua" disabled={!nick.trim()}
          onClick={() => onStart(nick.trim(), roundCount)}>
          게임 시작! 🚀
        </button>

        <p style={{marginTop:"1.2rem",fontSize:".78rem",color:"#ccc",lineHeight:1.7}}>
          정답은 없어요! 내 마음이 가는 곳이 답이에요 💝<br/>
          선택을 반복하다 보면 나에게 맞는 직업이 나와요!
        </p>
      </div>
    </div>
  );
}

// ─── 유틸 ────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─── 루트 앱 ─────────────────────────────────
function App() {
  const [screen, setScreen] = useState("nick"); // nick | game | result
  const [nickname, setNickname] = useState("");
  const [gameJobs, setGameJobs] = useState([]);
  const [winner, setWinner] = useState(null);

  const handleStart = (nick, count) => {
    setNickname(nick);
    setGameJobs(shuffle(ALL_JOBS).slice(0, count));
    setScreen("game");
  };

  const handleFinish = (job) => {
    setWinner(job);
    setScreen("result");
  };

  const handleRetry = () => {
    setWinner(null);
    setScreen("nick");
  };

  if (screen === "nick") return <NicknameScreen onStart={handleStart}/>;
  if (screen === "game") return <GameScreen nickname={nickname} jobs={gameJobs} onFinish={handleFinish}/>;
  if (screen === "result") return <ResultScreen winner={winner} nickname={nickname} onRetry={handleRetry}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
