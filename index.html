<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨ 직업 월드컵</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nanum Gothic',sans-serif;min-height:100vh;overflow-x:hidden;transition:background 1.2s ease}
#root{min-height:100vh}
.jua{font-family:'Jua',sans-serif}

body.theme-lobby {background:linear-gradient(135deg,#fff9f0 0%,#fff0fa 50%,#f0f4ff 100%)}
body.theme-t64   {background:linear-gradient(135deg,#e8f5e9 0%,#f1f8e9 50%,#e0f7fa 100%)}
body.theme-t32   {background:linear-gradient(135deg,#e3f2fd 0%,#e8eaf6 50%,#f3e5f5 100%)}
body.theme-t16   {background:linear-gradient(135deg,#fff3e0 0%,#fce4ec 50%,#f3e5f5 100%)}
body.theme-t8    {background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 50%,#ede7f6 100%)}
body.theme-t4    {background:linear-gradient(135deg,#ede7f6 0%,#e8eaf6 50%,#e3f2fd 100%)}
body.theme-final {background:linear-gradient(135deg,#1a0533 0%,#0d1b4a 50%,#0a2a1a 100%)}
body.theme-result{background:linear-gradient(135deg,#fff9f0 0%,#fff0fa 50%,#f0f4ff 100%)}

.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;opacity:.18;transition:all 1.2s ease}

/* 라운드 전환 오버레이 */
@keyframes transitionFade{0%{opacity:1}80%{opacity:1}100%{opacity:0;pointer-events:none}}
@keyframes roundIn{0%{opacity:0;transform:scale(.4) rotate(-12deg)}55%{transform:scale(1.18) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}

/* 닉네임 화면 */
.screen-nick{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative;z-index:1}
.nick-card{background:white;border-radius:32px;padding:2.8rem 2.5rem;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(255,130,100,.15),0 4px 16px rgba(0,0,0,.06);text-align:center;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
.title-badge{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:white;padding:.5rem 1.4rem;border-radius:99px;font-size:.9rem;margin-bottom:1.2rem;font-weight:700}
.main-title{font-size:2.8rem;line-height:1.15;margin-bottom:.5rem;background:linear-gradient(135deg,#ff6b6b 0%,#c471ed 50%,#12c2e9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub-title{color:#888;font-size:.95rem;margin-bottom:1.8rem}
.nick-input{width:100%;padding:1rem 1.4rem;border:2.5px solid #f0e0ff;border-radius:16px;font-size:1.2rem;font-family:'Jua',sans-serif;outline:none;transition:all .2s;background:#fafafa;text-align:center}
.nick-input:focus{border-color:#c471ed;background:white;box-shadow:0 0 0 4px rgba(196,113,237,.15)}
.nick-input::placeholder{color:#ccc}
.round-select{display:flex;gap:.5rem;justify-content:center;margin:1rem 0 1.4rem;flex-wrap:wrap}
.round-btn{padding:.55rem 1.1rem;border-radius:99px;border:2.5px solid #e8e0ff;background:white;font-family:'Jua',sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;color:#888}
.round-btn.active{background:linear-gradient(135deg,#c471ed,#12c2e9);color:white;border-color:transparent;transform:scale(1.06)}
.start-btn{width:100%;padding:1.1rem;border-radius:20px;border:none;background:linear-gradient(135deg,#ff6b6b 0%,#ff8e53 100%);color:white;font-family:'Jua',sans-serif;font-size:1.4rem;cursor:pointer;transition:all .25s;box-shadow:0 8px 24px rgba(255,107,107,.35)}
.start-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 12px 32px rgba(255,107,107,.45)}
.start-btn:active{transform:scale(.97)}
.start-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* 게임 화면 */
.screen-game{min-height:100vh;display:flex;flex-direction:column;padding:1rem 1.2rem;position:relative;z-index:1}
.game-header{margin-bottom:.8rem;position:relative;z-index:1}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.round-badge{padding:.38rem 1.1rem;border-radius:99px;font-size:.85rem;font-weight:700;color:white;transition:all .8s ease}
.progress-bar-bg{height:10px;border-radius:99px;overflow:hidden;transition:background .8s ease}
.progress-bar-fill{height:100%;border-radius:99px;transition:width .5s ease,background .8s ease}

.vs-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;position:relative;z-index:1}
.cards-row{display:flex;gap:.9rem;align-items:stretch;width:100%;max-width:640px}

/* 직업 카드 */
.job-card{flex:1;background:white;border-radius:24px;overflow:hidden;cursor:pointer;box-shadow:0 8px 28px rgba(0,0,0,.08);transition:all .25s cubic-bezier(.34,1.56,.64,1);border:3px solid transparent;display:flex;flex-direction:column}
.job-card:hover{transform:translateY(-8px) scale(1.04);box-shadow:0 20px 50px rgba(0,0,0,.16);border-color:#c471ed}
.job-card:active{transform:scale(.96)}
.job-card.chosen{animation:cardWin .45s ease forwards}
.job-card.unchosen{animation:cardLose .45s ease forwards}
.job-card.dark-card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.18);backdrop-filter:blur(8px)}
.job-card.dark-card:hover{border-color:#ffd700;box-shadow:0 20px 60px rgba(255,215,0,.28)}

.card-img-wrap{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden;background:linear-gradient(135deg,#f8f0ff,#f0f4ff);flex-shrink:0}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.job-card:hover .card-img{transform:scale(1.1)}
.card-skeleton{position:absolute;inset:0;background:linear-gradient(90deg,#f0e8ff 25%,#e8d8ff 50%,#f0e8ff 75%);background-size:200%;animation:shimmer 1.5s infinite}
.card-emoji-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:3.2rem}

.card-body{padding:.75rem .7rem .9rem;text-align:center;flex:1;display:flex;flex-direction:column;gap:.25rem}
.job-name{font-size:1.05rem;color:#222;font-weight:800;line-height:1.2}
.job-name.dk{color:white}
.job-work{font-size:.7rem;color:#888;line-height:1.55;flex:1}
.job-work.dk{color:rgba(255,255,255,.68)}
.job-person{font-size:.67rem;color:#a020c0;font-weight:700}
.job-person.dk{color:#ffd700}
.pick-hint{font-size:.67rem;color:#ddd}
.pick-hint.dk{color:rgba(255,255,255,.35)}

.vs-badge{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.1rem;font-weight:900;font-family:'Jua',sans-serif;flex-shrink:0;animation:pulse 2s infinite}

.comment-box{border-radius:16px;padding:.6rem 1.2rem;font-size:.86rem;box-shadow:0 4px 16px rgba(0,0,0,.06);max-width:460px;text-align:center;animation:slideUp .4s ease}
.comment-box.lt{background:white;color:#555}
.comment-box.dk{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);backdrop-filter:blur(8px)}

/* 결과 화면 */
.screen-result{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;z-index:1;text-align:center}
.result-card{background:white;border-radius:36px;padding:2.5rem 2rem;max-width:500px;width:100%;box-shadow:0 24px 80px rgba(196,113,237,.2);animation:popIn .7s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1}
.winner-crown{font-size:3.2rem;animation:bounce 1s ease infinite alternate;display:block;margin-bottom:.4rem}
.result-title{font-size:1rem;color:#aaa;margin-bottom:.3rem}
.nick-hl{color:#c471ed;font-size:1.15rem}
.winner-img-wrap{width:180px;height:180px;margin:.9rem auto;border-radius:24px;overflow:hidden;box-shadow:0 12px 40px rgba(196,113,237,.25);background:linear-gradient(135deg,#f8f0ff,#f0f4ff);position:relative}
.winner-img{width:100%;height:100%;object-fit:cover}
.winner-emoji-big{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:5rem}
.winner-name{font-size:2rem;background:linear-gradient(135deg,#ff6b6b,#c471ed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:.4rem 0}
.winner-desc{color:#666;font-size:.88rem;margin-bottom:.6rem;line-height:1.65}
.winner-person-box{display:inline-flex;align-items:center;gap:.5rem;background:#fff0fb;border:1.5px solid #f0d0ff;border-radius:12px;padding:.42rem .9rem;font-size:.8rem;color:#a020c0;font-weight:700;margin-bottom:1rem}
.info-section{margin-bottom:1rem;text-align:left}
.info-label{font-size:.74rem;color:#bbb;font-weight:700;letter-spacing:.06em;margin-bottom:.45rem;text-transform:uppercase}
.tag-row{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{padding:.35rem .82rem;border-radius:99px;font-size:.78rem;font-weight:700}
.tag-skill{background:#f0e8ff;color:#9c4dd8}
.tag-subject{background:#e8f4ff;color:#3b82f6}
.tag-trait{background:#fff0e8;color:#ea580c}
.link-section{margin-top:1rem}
.link-btn{display:flex;align-items:center;gap:.6rem;padding:.75rem 1rem;border-radius:14px;background:#f8f4ff;border:1.5px solid #e8d8ff;text-decoration:none;color:#7c3aed;font-size:.84rem;font-weight:700;transition:all .2s;margin-bottom:.5rem}
.link-btn:hover{background:#f0e4ff;transform:translateX(4px)}
.link-icon{font-size:1.1rem;flex-shrink:0}
.retry-btn{width:100%;margin-top:1.3rem;padding:.95rem;border-radius:20px;border:none;background:linear-gradient(135deg,#c471ed,#12c2e9);color:white;font-family:'Jua',sans-serif;font-size:1.3rem;cursor:pointer;transition:all .25s;box-shadow:0 8px 24px rgba(196,113,237,.35)}
.retry-btn:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(196,113,237,.45)}

/* 애니메이션 */
@keyframes popIn{from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
@keyframes cardWin{0%{transform:scale(1)}40%{transform:scale(1.09)}100%{transform:scale(1)}}
@keyframes cardLose{0%{opacity:1}100%{opacity:.22;transform:scale(.88) rotate(-4deg)}}

@media(max-width:480px){
  .main-title{font-size:2.2rem}
  .job-name{font-size:.92rem}
  .cards-row{gap:.6rem}
  .winner-name{font-size:1.75rem}
  .card-img-wrap{aspect-ratio:1}
  .job-work{font-size:.65rem}
}
</style>
</head>

function pickComment(size,total){
  const ratio=size/total;
  let pool;
  if(size===2) pool=COMMENTS.final;
  else if(ratio>=.5) pool=COMMENTS.early;
  else if(ratio>=.25) pool=COMMENTS.mid;
  else pool=COMMENTS.late;
  return pool[Math.floor(Math.random()*pool.length)];
}

const PEXELS_KEY="5PTBHeIho5LvAdO7iszScz8DEHxt2pgktrGEl6T2lUF0I9A9dOLIUxoS";
const imgCache={};

function useJobImg(keyword){
  const [src,setSrc]=useState(imgCache[keyword]||null);
  const [loading,setLoading]=useState(!imgCache[keyword]);
  useEffect(()=>{
    if(imgCache[keyword]){setSrc(imgCache[keyword]);setLoading(false);return;}
    let dead=false;setLoading(true);
    fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(keyword)}&per_page=3&orientation=square`,
      {headers:{Authorization:PEXELS_KEY}})
      .then(r=>r.json()).then(d=>{
        if(!dead&&d.photos&&d.photos.length){
          const u=d.photos[Math.floor(Math.random()*Math.min(d.photos.length,3))].src.medium;
          imgCache[keyword]=u;setSrc(u);
        }
      }).catch(()=>{}).finally(()=>{if(!dead)setLoading(false);});
    return()=>{dead=true;};
  },[keyword]);
  return {src,loading};
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function RoundTransition({theme,show,onDone}){
  useEffect(()=>{if(!show)return;const t=setTimeout(onDone,1900);return()=>clearTimeout(t);},[show]);
  if(!show)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:999,background:theme.trBg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"1rem",animation:"transitionFade 1.9s ease forwards"}}>
      <div style={{textAlign:"center",animation:"roundIn 1.6s cubic-bezier(.34,1.56,.64,1) forwards"}}>
        <div style={{fontSize:"5rem",marginBottom:".5rem"}}>{theme.icon}</div>
        <div style={{fontFamily:"'Jua',sans-serif",fontSize:"3rem",color:theme.trColor,textShadow:"0 4px 24px rgba(0,0,0,.4)"}}>{theme.label}</div>
        <div style={{fontSize:"1rem",color:theme.trColor,opacity:.8,marginTop:".5rem"}}>{theme.flavor}</div>
      </div>
    </div>
  );
}

function ResultScreen({winner,nickname,onRetry}){
  const {src,loading}=useJobImg(winner.keyword);
  const canvasRef=useRef(null);
  useEffect(()=>{
    const cv=canvasRef.current;if(!cv)return;
    const ctx=cv.getContext("2d");cv.width=window.innerWidth;cv.height=window.innerHeight;
    const colors=["#ff6b6b","#c471ed","#12c2e9","#ffd93d","#6bcb77","#ff8e53","#a855f7","#ec4899"];
    const pieces=Array.from({length:160},()=>({
      x:Math.random()*cv.width,y:Math.random()*-cv.height,
      r:Math.random()*9+4,color:colors[Math.floor(Math.random()*colors.length)],
      speed:Math.random()*3.5+1.5,spin:(Math.random()-.5)*.22,angle:0,
      shape:Math.random()>.5?"rect":"circle",
    }));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,cv.width,cv.height);
      pieces.forEach(p=>{
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;
        if(p.shape==="circle"){ctx.beginPath();ctx.arc(0,0,p.r/2,0,Math.PI*2);ctx.fill();}
        else ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.55);
        ctx.restore();p.y+=p.speed;p.angle+=p.spin;
        if(p.y>cv.height){p.y=-20;p.x=Math.random()*cv.width;}
      });
      raf=requestAnimationFrame(draw);
    };
    draw();const t=setTimeout(()=>cancelAnimationFrame(raf),7000);

  const ytUrl=`https://www.youtube.com/results?search_query=${encodeURIComponent(winner.name+" 인터뷰")}`;

function GameScreen({nickname,jobs,total,onFinish}){
  const [bracket,setBracket]=useState(()=>shuffle([...jobs]));
  const [cur,setCur]=useState(0);
  const [winners,setWinners]=useState([]);
  const [chosen,setChosen]=useState(null);
  const [unchosen,setUnchosen]=useState(null);
  const [comment,setComment]=useState(()=>pickComment(jobs.length,total));
  const [showTrans,setShowTrans]=useState(false);
  const [pending,setPending]=useState(null);

  const theme=getTheme(bracket.length);
  const pairs=Math.floor(bracket.length/2);
  const done=Math.floor(cur/2);

  useEffect(()=>{document.body.className=theme.bodyClass;return()=>{document.body.className="theme-lobby";};},[theme.bodyClass]);

  const pick=useCallback((picked)=>{
    const other=bracket[cur]===picked?bracket[cur+1]:bracket[cur];
    setChosen(picked.id);setUnchosen(other.id);
    setComment(pickComment(bracket.length,total));
    setTimeout(()=>{
      setChosen(null);setUnchosen(null);
      const nw=[...winners,picked];
      const nc=cur+2;
      if(nc>=bracket.length){
        if(nw.length===1){onFinish(nw[0]);return;}
        const nb=shuffle(nw);
        setPending(nb);setShowTrans(true);
      } else {
        setWinners(nw);setCur(nc);
      }
    },480);
  },[cur,bracket,winners,onFinish,total]);

  const onTransDone=()=>{
    setShowTrans(false);
    setBracket(pending);setWinners([]);setCur(0);setPending(null);
  };

  const nextTheme=pending?getTheme(pending.length):theme;
  const left=bracket[cur];const right=bracket[cur+1];

  return(
    <>
      <RoundTransition theme={nextTheme} show={showTrans} onDone={onTransDone}/>
      <div className="screen-game">
        <BgDeco t={theme}/>
        <div className="game-header">
          <div className="progress-info">
            <span className="round-badge jua" style={{background:theme.badgeGrad}}>
              {theme.icon} {theme.label}
            </span>
            <span style={{fontSize:".78rem",color:theme.dk?"rgba(255,255,255,.55)":"#bbb",fontWeight:700}}>
              {done+1} / {pairs} 경기
            </span>
          </div>
          <div className="progress-bar-bg" style={{background:theme.pbBg}}>
            <div className="progress-bar-fill" style={{width:`${Math.min((done/pairs)*100,100)}%`,background:theme.pbFill}}/>
          </div>
        </div>

        <div className="vs-area">
          <p className="jua" style={{fontSize:".88rem",color:theme.dk?"rgba(255,255,255,.45)":"#bbb"}}>
              💰경제성 ⚖️삶의 질 🌟자기만족 🚀미래성 🎖️사회적 요소 모두 고려해서 더 끌리는 직업을 골라봐!
          </p>
          <div className="cards-row">
            {left&&right&&<>
              <JobCard key={`${left.id}-${cur}-${bracket.length}`} job={left}
                onClick={pick} chosen={chosen===left.id} unchosen={unchosen===left.id} isDark={theme.dk}/>
              <div className="vs-badge" style={{background:theme.vsBg,boxShadow:"0 8px 24px rgba(0,0,0,.22)"}}>
                <span className="jua">VS</span>
              </div>
              <JobCard key={`${right.id}-${cur}-${bracket.length}`} job={right}
                onClick={pick} chosen={chosen===right.id} unchosen={unchosen===right.id} isDark={theme.dk}/>
            </>}
          </div>
          <div className={`comment-box ${theme.dk?"dk":"lt"}`} key={comment}>{comment}</div>
          <p style={{fontSize:".72rem",color:theme.dk?"rgba(255,255,255,.6)":"#ddd",marginTop:".2rem"}}>
            {nickname} 진행중 ✨ 남은 직업 {bracket.length - done*2}개
          </p>
        </div>
      </div>
    </>
  );
}

// ══════ 닉네임 화면 ══════
function NicknameScreen({onStart}){
  const [nick,setNick]=useState("");
  const [cnt,setCnt]=useState(16);
  return(
    <div className="screen-nick">
      <BgDeco t={{bg1:"#ff6b6b",bg2:"#c471ed",bg3:"#12c2e9"}}/>
      <div className="nick-card">
        <div className="title-badge jua">✨ 진로 탐색 게임</div>
        <h1 className="main-title jua">직업<br/>월드컵</h1>
        <p className="sub-title">내 마음에 드는 직업을 찾아봐! 🔍</p>
        <input className="nick-input jua" placeholder="닉네임을 입력해줘! 😊"
          value={nick} onChange={e=>setNick(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&nick.trim()&&onStart(nick.trim(),cnt)}
          maxLength={10} autoFocus/>
        <div style={{margin:".9rem 0 .4rem",fontSize:".8rem",color:"#bbb",fontWeight:700}}>몇 강부터 시작할까?</div>
        <div className="round-select">
          {ROUND_OPTS.map(o=>(
            <button key={o.count} className={`round-btn jua ${cnt===o.count?"active":""}`}
              onClick={()=>setCnt(o.count)}>{o.label}</button>
          ))}
        </div>
        <div style={{background:"#faf8ff",borderRadius:14,padding:".75rem 1rem",marginBottom:"1.2rem",fontSize:".75rem",color:"#aaa",lineHeight:1.8,textAlign:"left"}}>
          <span style={{color:"#c471ed",fontWeight:700}}>8강</span> 약 4분 &nbsp;|&nbsp;
          <span style={{color:"#3949ab",fontWeight:700}}>16강</span> 약 8분 &nbsp;|&nbsp;
          <span style={{color:"#fb8c00",fontWeight:700}}>32강</span> 약 16분 &nbsp;|&nbsp;
          <span style={{color:"#43a047",fontWeight:700}}>64강</span> 약 30분<br/>
          <span style={{fontSize:".7rem"}}>강이 올라갈수록 더 다양한 직업을 탐색할 수 있어요!</span>
        </div>
        <button className="start-btn jua" disabled={!nick.trim()}
          onClick={()=>onStart(nick.trim(),cnt)}>게임 시작! 🚀</button>
        <p style={{marginTop:"1rem",fontSize:".73rem",color:"#ccc",lineHeight:1.8}}>
          정답은 없어요! 내 마음이 가는 곳이 답이에요 💝<br/>
          선택을 반복하다 보면 나에게 맞는 직업이 나와요!
        </p>
      </div>
    </div>
  );
}

// ══════ 루트 ══════
function App(){
  const [screen,setScreen]=useState("nick");
  const [nickname,setNickname]=useState("");
  const [gameJobs,setGameJobs]=useState([]);
  const [total,setTotal]=useState(16);
  const [winner,setWinner]=useState(null);

  useEffect(()=>{
    if(screen==="nick"||screen==="result") document.body.className="theme-lobby";
  },[screen]);

  const start=(nick,cnt)=>{
    const c=Math.min(cnt,ALL_JOBS.length);
    setNickname(nick);setTotal(c);
    setGameJobs(shuffle(ALL_JOBS).slice(0,c));
    setScreen("game");
  };
  const finish=(job)=>{setWinner(job);document.body.className="theme-result";setScreen("result");};
  const retry=()=>{setWinner(null);document.body.className="theme-lobby";setScreen("nick");};

  if(screen==="nick")   return <NicknameScreen onStart={start}/>;
  if(screen==="game")   return <GameScreen nickname={nickname} jobs={gameJobs} total={total} onFinish={finish}/>;
  if(screen==="result") return <ResultScreen winner={winner} nickname={nickname} onRetry={retry}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
